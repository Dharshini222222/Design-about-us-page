<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        .about-section{
            padding:80px 20px;
            text-align:center;
            background:#007bff;
            color:white;
        }

        .about-section h1{
            font-size:48px;
            margin-bottom:15px;
        }

        .container{
            max-width:1100px;
            margin:auto;
            padding:50px 20px;
        }

        .about-content{
            display:flex;
            flex-wrap:wrap;
            align-items:center;
            gap:30px;
        }

        .about-image{
            flex:1;
        }

        .about-image img{
            width:100%;
            border-radius:10px;
        }

        .about-text{
            flex:1;
        }

        .about-text h2{
            margin-bottom:20px;
            color:#333;
        }

        .about-text p{
            line-height:1.8;
            color:#555;
            margin-bottom:15px;
        }

        .btn{
            display:inline-block;
            padding:12px 25px;
            background:#007bff;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

        @media(max-width:768px){
            .about-content{
                flex-direction:column;
            }

            .about-section h1{
                font-size:36px;
            }
        }
    </style>
</head>
<body>

    <section class="about-section">
        <h1>About Us</h1>
        <p>Learn more about our company and mission.</p>
    </section>

    <div class="container">
        <div class="about-content">
            <div class="about-image">
                <img src="https://via.placeholder.com/500x350" alt="About Us">
            </div>

            <div class="about-text">
                <h2>Who We Are</h2>
                <p>
                    We are a passionate team dedicated to creating modern,
                    user-friendly websites and digital solutions.
                </p>

                <p>
                    Our mission is to help businesses grow online through
                    innovative design, quality development, and excellent support.
                </p>

                <a href="#" class="btn">Learn More</a>
            </div>
        </div>
    </div>

</body>
</html>
